<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inleo Skins</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <h1>Inleo Skins <span class="version">v1.0</span></h1>
    </div>

    <div class="content">
        <label for="theme-select">Select Theme:</label>
        <select id="theme-select">
            <option value="none">None (Default)</option>
            <option value="cyberpunk">Cyberpunk V1</option>
            <option value="cyberpunk-v2">Cyberpunk V2 (Stitch)</option>
            <option value="godzilla">Pixel Godzilla</option>
        </select>
    </div>

    <div class="footer">
        <button id="apply-btn">Apply Theme</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
